<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CEP Finder — Processando...</title>
    <!-- Atualiza a página a cada 3 segundos automaticamente -->
    <meta http-equiv="refresh" content="3">
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 100px auto;
               padding: 0 20px; text-align: center; }
        .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0;
                   border-top-color: #2563eb; border-radius: 50%;
                   animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1   { font-size: 20px; margin-bottom: 8px; }
        p    { color: #666; font-size: 14px; line-height: 1.6; }
        .file-name { font-weight: 500; color: #1e293b; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>Processando CEPs...</h1>
    <p>
        O arquivo <span class="file-name">{{ uploaded.original_name }}</span>
        está sendo processado em background.<br><br>
        Esta página atualiza automaticamente a cada 3 segundos.
        Aguarde — você será redirecionado quando terminar.
    </p>
</body>
</html>
